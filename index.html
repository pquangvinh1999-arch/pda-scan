<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO - VINH ENTERPRISE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(30px); }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col p-4">
    <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight">WHM PRO BY VINH</h1>
            <p class="text-[10px] opacity-80 uppercase font-semibold">WHM PRO ENTERPRISE | {{ currentTime }}</p>
        </div>
        <div class="text-right">
            <p class="text-3xl font-black">{{ queue.length }}</p>
            <p class="text-[10px] uppercase">Tags ID chờ </p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4 mb-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">1. Vị trí (Bin)</label>
            <input v-model="form.loc" ref="locInput" @keyup.enter="$refs.tagInput.focus()"
                   class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-2xl font-bold text-indigo-600 outline-none transition-all input-focus"
                   placeholder="Quét Vị Trí...">
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">2. Quét Tag ID</label>
            <input v-model="form.tag" ref="tagInput" @keyup.enter="handleScan"
                   class="w-full mt-1 p-4 bg-indigo-50 border-2 border-indigo-100 rounded-xl text-center text-xl font-bold text-slate-700 outline-none transition-all input-focus"
                   placeholder="Quét Tag ID tại đây...">
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button @click="exportExcel" class="bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                📥 Xuất Excel
            </button>
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all disabled:opacity-50">
                {{ isSyncing ? '... Đang lưu' : '🚀 Đồng bộ Cloud' }}
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2 px-2">
            <h3 class="text-xs font-bold text-slate-500 uppercase">Hàng chờ (Mới nhất trên cùng)</h3>
            <button @click="clearAll" class="text-[10px] font-bold text-red-500">LÀM MỚI</button>
        </div>
        
        <div class="overflow-y-auto flex-1 space-y-2 pb-10">
            <transition-group name="list">
                <div v-for="item in queueReversed" :key="item.id" 
                     class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="bg-indigo-100 text-indigo-700 text-[10px] px-2 py-0.5 rounded-full font-bold">{{ item.loc }}</span>
                            <span class="text-slate-400 text-[9px]">{{ item.time }}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800">Tag ID: {{ item.tag }}</p>
                    </div>
                    <div class="flex gap-1">
                        <button @click="editItem(item.id)" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        </button>
                        <button @click="deleteItem(item.id)" class="text-red-400 p-2 hover:bg-red-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            </transition-group>
            <div v-if="queue.length === 0" class="text-center py-10 text-slate-400 text-xs italic">
                Chưa có dữ liệu. Hãy quét để bắt đầu.
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;

    createApp({
        setup() {
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_WHM_Mapping')) || []);
            const form = ref({ loc: '', tag: '' });
            const isSyncing = ref(false);
            const currentTime = ref('');
            const locInput = ref(null);
            const tagInput = ref(null);

            // ⚠️ THAY LINK MỚI CỦA ANH VÀO ĐÂY
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbwc6E8tk3IFSliy_Zs0JEePHheEso5cTDcNzNg9bHVtaoz-c9U7dhSHXr317vlFpp9q3w/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const updateTime = () => {
                currentTime.value = new Date().toLocaleTimeString('vi-VN');
            };

            const handleScan = () => {
                if (!form.value.loc || !form.value.tag) {
                    alert("Vui lòng quét đủ Vị trí và Tag!");
                    return;
                }

                queue.value.push({
                    id: Date.now(),
                    loc: form.value.loc.trim(),
                    tag: form.value.tag.trim(),
                    time: new Date().toLocaleString('vi-VN')
                });

                form.value.tag = ''; 
                saveLocal();
                tagInput.value.focus();
            };

            const syncCloud = async () => {
                isSyncing.value = true;
                try {
                    // Chuẩn hóa dữ liệu gửi đi khớp chính xác với App Script
                    const payload = { 
                        data: queue.value.map(i => ({
                            tagID: i.tag,
                            bin: i.loc,
                            thoiGian: i.time // Gửi đi là thoiGian (không dấu)
                        }))
                    };

                    await fetch(CLOUD_API, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    alert("🚀 Đã đồng bộ lên Cloud thành công!");
                    queue.value = [];
                    saveLocal();
                } catch (e) {
                    alert("❌ Lỗi kết nối. Vui lòng kiểm tra lại!");
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => localStorage.setItem('Vinh_WHM_Mapping', JSON.stringify(queue.value));
            const deleteItem = (id) => { queue.value = queue.value.filter(i => i.id !== id); saveLocal(); };
            const editItem = (id) => {
                const item = queue.value.find(i => i.id === id);
                const newVal = prompt("Sửa lại Tag ID:", item.tag);
                if (newVal) { item.tag = newVal.trim(); saveLocal(); }
            };
            const clearAll = () => { if(confirm('Xóa hết hàng chờ?')) { queue.value = []; saveLocal(); }};
            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(queue.value.map(i => ({ "Tag ID": i.tag, "Bin": i.loc, "Thời gian": i.time })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, `WHM_Mapping_${Date.now()}.xlsx`);
            };

            onMounted(() => {
                updateTime();
                setInterval(updateTime, 1000);
                locInput.value.focus();
            });

            return { queue, form, queueReversed, isSyncing, currentTime, locInput, tagInput, handleScan, syncCloud, deleteItem, editItem, clearAll, exportExcel };
        }
    }).mount('#app');
</script>
</body>
</html>
