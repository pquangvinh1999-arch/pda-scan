<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO - Vue Edition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div id="app" class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b">
            <h1 class="text-xl font-extrabold text-indigo-600">WHM PRO VUE</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <div @click="page = 'nhap'" :class="page === 'nhap' ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:bg-slate-100'" class="p-3 rounded-xl cursor-pointer font-bold transition-all">Nhập kho</div>
            <div @click="page = 'tonkho'; fetchSheetData()" :class="page === 'tonkho' ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:bg-slate-100'" class="p-3 rounded-xl cursor-pointer font-bold transition-all">Tồn Kho</div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 class="font-bold">{{ page === 'nhap' ? 'Quy trình Nhập kho' : 'Tồn Kho Thành Phẩm' }}</h2>
            <div class="text-sm font-bold text-slate-400">{{ currentTime }}</div>
        </header>

        <main class="flex-1 p-6 overflow-hidden">
            <div v-if="page === 'nhap'" class="max-w-xl mx-auto">
                <div class="bg-white p-8 rounded-3xl shadow-xl space-y-4">
                    <div class="flex justify-between">
                        <span class="font-bold text-indigo-600">Bước {{ step }}: {{ stepLabel }}</span>
                        <button @click="resetForm" class="text-xs text-red-500 font-bold">Làm mới</button>
                    </div>

                    <div class="space-y-3">
                        <input v-model="form.bin" :disabled="step !== 1" @keyup.enter="step = 2" ref="inp1" class="w-full p-4 bg-slate-50 border-2 rounded-2xl text-center text-xl font-bold focus:border-indigo-500 outline-none" placeholder="1. Quét Bin">
                        <input v-model="form.tag" :disabled="step !== 2" @keyup.enter="step = 3" ref="inp2" class="w-full p-4 bg-slate-50 border-2 rounded-2xl text-center text-xl font-bold focus:border-indigo-500 outline-none" placeholder="2. Quét Tag ID">
                        <input v-model="form.qty" :disabled="step !== 3" @keyup.enter="addToQueue" ref="inp3" type="number" class="w-full p-4 bg-slate-50 border-2 rounded-2xl text-center text-xl font-bold focus:border-indigo-500 outline-none" placeholder="3. Nhập Số Lượng">
                    </div>

                    <div class="pt-4 flex justify-between items-center">
                        <p class="text-2xl font-black text-indigo-600">{{ queue.length }} Tags</p>
                        <button @click="syncData" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">ĐỒNG BỘ CLOUD</button>
                    </div>
                </div>
            </div>

            <div v-else class="h-full flex flex-col space-y-4">
                <input v-model="search" placeholder="Tìm kiếm nhanh..." class="p-3 border rounded-xl w-96 shadow-sm">
                <div class="bg-white rounded-2xl border shadow-sm flex-1 overflow-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 sticky top-0">
                            <tr>
                                <th class="p-4">MÃ HÀNG</th><th class="p-4">QTY THỰC</th><th class="p-4">TAG ID</th><th class="p-4 text-center">THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(item, index) in filteredData" :key="index" class="border-b hover:bg-slate-50">
                                <td class="p-4 font-bold">{{ item.vals[1] }}</td>
                                <td class="p-4 text-blue-600 font-black">{{ item.vals[2] }}</td>
                                <td class="p-4">{{ item.vals[7] }}</td>
                                <td class="p-4 text-center">
                                    <button @click="editRow(item)" class="text-indigo-600 font-bold mr-3">Sửa</button>
                                    <button @click="deleteRow(item)" class="text-red-500 font-bold">Xóa</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const page = ref('nhap');
            const step = ref(1);
            const search = ref('');
            const queue = ref([]);
            const allData = ref([]);
            const currentTime = ref(new Date().toLocaleString());
            const form = ref({ bin: '', tag: '', qty: '' });

            const API_URL = 'API_CỦA_ANH_VÀO_ĐÂY';
            const CSV_URL = 'CSV_CỦA_ANH_VÀO_ĐÂY';

            // Tự động nhảy label theo bước
            const stepLabel = computed(() => {
                if (step.value === 1) return "Quét Vị trí (Bin)";
                if (step.value === 2) return "Quét Tag ID";
                return "Nhập Số Lượng (QTY)";
            });

            // Tự động lọc bảng khi gõ tìm kiếm
            const filteredData = computed(() => {
                return allData.value.filter(item => 
                    item.vals.join(' ').toLowerCase().includes(search.value.toLowerCase())
                );
            });

            const addToQueue = () => {
                if(!form.value.qty) return;
                queue.value.push({ ...form.value, date: new Date().toLocaleDateString(), id: Date.now() });
                form.value.tag = ''; form.value.qty = ''; // Giữ lại Bin
                step.value = 2; // Quay lại bước 2
            };

            const fetchSheetData = async () => {
                const res = await fetch(CSV_URL + '&cache=' + Date.now());
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                allData.value = rows.map((row, idx) => ({ vals: row.split(','), rowIdx: idx + 2 })).filter(r => r.vals.length > 5);
            };

            const resetForm = () => { location.reload(); };

            // Cập nhật đồng hồ mỗi giây
            setInterval(() => { currentTime.value = new Date().toLocaleString(); }, 1000);

            return { page, step, stepLabel, form, queue, allData, search, filteredData, currentTime, addToQueue, fetchSheetData, resetForm };
        }
    }).mount('#app');
</script>
</body>
</html>
