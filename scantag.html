<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA MAPPING PRO - VINH ENTERPRISE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(30px); }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col p-4">
    <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg mb-4">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">PDA MAPPING PRO</h1>
                <p class="text-xs opacity-80 uppercase font-semibold">Vinh Enterprise System</p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-black">{{ queue.length }}</p>
                <p class="text-[10px] uppercase">Tags đợi đồng bộ</p>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4 mb-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Bước 1: Vị trí (Bin/Loc)</label>
            <input v-model="form.loc" ref="locInput" @keyup.enter="focusTag"
                   class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-bold input-focus outline-none transition-all"
                   placeholder="Quét Vị Trí...">
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Bước 2: Mã Tag (Tag ID)</label>
            <input v-model="form.tag" ref="tagInput" @keyup.enter="handleScan"
                   class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-bold input-focus outline-none transition-all"
                   placeholder="Quét Tag ID...">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button @click="exportExcel" class="bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>📥</span> Excel
            </button>
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
                {{ isSyncing ? '...Đang lưu' : '☁️ Đồng bộ Cloud' }}
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2 px-2">
            <h3 class="text-sm font-bold text-slate-600">Dữ liệu trong hàng chờ</h3>
            <button @click="clearAll" class="text-[10px] font-bold text-red-500 uppercase">Xóa hết</button>
        </div>
        
        <div class="overflow-y-auto flex-1 space-y-2 pr-1">
            <transition-group name="list">
                <div v-for="(item, index) in queueReversed" :key="item.id" 
                     class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center group">
                    <div>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">Tag: {{ item.tag }}</p>
                        <p class="text-sm font-bold text-slate-700">📍 {{ item.loc }}</p>
                    </div>
                    <div class="flex gap-2">
                        <button @click="editItem(item.id)" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                        <button @click="deleteItem(item.id)" class="p-2 text-red-400 hover:bg-red-50 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            </transition-group>
            
            <div v-if="queue.length === 0" class="text-center py-10 text-slate-400 italic text-sm">
                Đã đồng bộ sạch sẽ hoặc chưa có mã mới...
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;

    createApp({
        setup() {
            // 1. Quản lý trạng thái
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_PDA_Data')) || []);
            const form = ref({ loc: '', tag: '' });
            const isSyncing = ref(false);
            const locInput = ref(null);
            const tagInput = ref(null);

            // ⚠️ ANH DÁN URL APPS SCRIPT ĐÃ TRIỂN KHAI VÀO ĐÂY
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbx_yiyQX_5sZzzjuYCewBJbolSwfD_wZK5qDetlbvN1bTrqoVNGU7Pm2SS-ZOl4lN0T9g/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const focusTag = () => {
                if (form.value.loc) tagInput.value.focus();
            };

            const handleScan = () => {
                const locVal = form.value.loc.trim();
                const tagVal = form.value.tag.trim();

                if (!locVal) {
                    alert("⚠️ Anh chưa quét Vị trí!");
                    locInput.value.focus();
                    return;
                }
                if (!tagVal) return;

                // Thêm vào danh sách tạm
                queue.value.push({
                    id: Date.now(),
                    loc: locVal,
                    tag: tagVal,
                    time: new Date().toLocaleString('vi-VN')
                });

                form.value.tag = ''; // Xóa mã tag để quét mã tiếp theo
                saveLocal();
                tagInput.value.focus();
            };

            const syncCloud = async () => {
                if (queue.value.length === 0) return;
                if (CLOUD_API.includes('DÁN_LINK')) return alert("Anh chưa dán link Cloud API kìa!");
                
                isSyncing.value = true;
                
                try {
                    // Cấu trúc dữ liệu khớp hoàn toàn với JSON.parse trong Apps Script của anh
                    const payload = {
                        data: queue.value 
                    };

                    await fetch(CLOUD_API, {
                        method: 'POST',
                        mode: 'no-cors', // Bắt buộc cho Google Apps Script
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // Vì no-cors không đọc được response, ta giả định thành công nếu không nhảy vào catch
                    alert("🚀 Đồng bộ thành công về Cloud!");
                    queue.value = []; // Xóa danh sách sau khi đã gửi đi thành công
                    saveLocal();
                    
                } catch (e) {
                    console.error(e);
                    alert("❌ Lỗi kết nối! Anh kiểm tra mạng hoặc link API nhé.");
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => {
                localStorage.setItem('Vinh_PDA_Data', JSON.stringify(queue.value));
            };

            const deleteItem = (id) => {
                queue.value = queue.value.filter(item => item.id !== id);
                saveLocal();
            };

            const editItem = (id) => {
                const item = queue.value.find(i => i.id === id);
                const newTag = prompt("Sửa lại Tag ID:", item.tag);
                if (newTag !== null) {
                    item.tag = newTag.trim();
                    saveLocal();
                }
            };

            const clearAll = () => {
                if(confirm('Xóa sạch danh sách đợi?')) {
                    queue.value = [];
                    saveLocal();
                }
            };

            const exportExcel = () => {
                if (queue.value.length === 0) return alert("Không có dữ liệu!");
                const excelData = queue.value.map(item => ({ "Tag ID": item.tag, "Vị Trí": item.loc, "Thời Gian": item.time }));
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Mapping");
                XLSX.writeFile(wb, `PDA_Export_${Date.now()}.xlsx`);
            };

            onMounted(() => {
                locInput.value.focus();
            });

            return { queue, form, queueReversed, isSyncing, locInput, tagInput, focusTag, handleScan, syncCloud, deleteItem, editItem, clearAll, exportExcel };
        }
    }).mount('#app');
</script>
</body>
</html>
